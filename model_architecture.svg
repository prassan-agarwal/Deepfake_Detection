<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 750" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <linearGradient id="spatialGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#357ABD"/>
    </linearGradient>
    <linearGradient id="temporalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5CB85C"/>
      <stop offset="100%" style="stop-color:#449D44"/>
    </linearGradient>
    <linearGradient id="freqGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <linearGradient id="fusionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
    <linearGradient id="classifierGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="750" fill="#F8F9FA" rx="12"/>

  <!-- Title Banner -->
  <rect x="400" y="12" width="600" height="52" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="700" y="46" text-anchor="middle" fill="white" font-size="26" font-weight="bold">Model Architecture</text>

  <!-- ==================== INPUT ==================== -->
  <!-- Video Icon -->
  <rect x="20" y="300" width="90" height="90" rx="14" fill="#E74C3C" filter="url(#shadow)"/>
  <polygon points="50,325 50,365 75,345" fill="white"/>
  <!-- Film strip lines -->
  <rect x="24" y="304" width="10" height="8" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="24" y="318" width="10" height="8" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="24" y="374" width="10" height="8" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="96" y="304" width="10" height="8" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="96" y="318" width="10" height="8" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="96" y="374" width="10" height="8" rx="1" fill="rgba(255,255,255,0.4)"/>
  <text x="65" y="415" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Input Video</text>

  <!-- Arrow from video to preprocessing -->
  <line x1="112" y1="345" x2="148" y2="345" stroke="#666" stroke-width="2.5" marker-end="url(#arrowGrey)"/>
  <defs><marker id="arrowGrey" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#666"/></marker></defs>

  <!-- ==================== PREPROCESSING ==================== -->
  <rect x="150" y="275" width="130" height="140" rx="10" fill="white" stroke="#17A2B8" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="150" y="275" width="130" height="32" rx="10" fill="#17A2B8"/>
  <rect x="150" y="295" width="130" height="12" fill="#17A2B8"/>
  <text x="215" y="296" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Preprocessing</text>
  <text x="215" y="325" text-anchor="middle" fill="#333" font-size="11">MTCNN Face</text>
  <text x="215" y="340" text-anchor="middle" fill="#333" font-size="11">Detection</text>
  <text x="215" y="360" text-anchor="middle" fill="#666" font-size="10">16 frames</text>
  <text x="215" y="375" text-anchor="middle" fill="#666" font-size="10">224 x 224</text>
  <text x="215" y="390" text-anchor="middle" fill="#666" font-size="10">ImageNet Norm</text>

  <!-- Arrow from preprocessing to branches split -->
  <line x1="282" y1="345" x2="330" y2="345" stroke="#666" stroke-width="2.5" marker-end="url(#arrowGrey)"/>

  <!-- ==================== BRANCH SPLIT POINT ==================== -->
  <!-- Three diverging arrows -->
  <!-- Top arrow to Spatial -->
  <path d="M 330,345 Q 350,345 365,180" stroke="#4A90D9" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/></marker></defs>
  <!-- Middle arrow to Temporal (will come from spatial) -->
  <!-- Bottom arrow to Frequency -->
  <path d="M 330,345 Q 350,345 365,560" stroke="#9B59B6" stroke-width="2.5" fill="none" marker-end="url(#arrowPurple)"/>
  <defs><marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9B59B6"/></marker></defs>

  <!-- ==================== BRANCH 1: SPATIAL (Top) ==================== -->
  <rect x="370" y="82" width="260" height="200" rx="10" fill="white" stroke="#4A90D9" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="370" y="82" width="260" height="34" rx="10" fill="url(#spatialGrad)"/>
  <rect x="370" y="104" width="260" height="12" fill="url(#spatialGrad)"/>
  <text x="500" y="105" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Spatial Branch</text>

  <!-- MobileNetV3-Small table -->
  <rect x="385" y="128" width="230" height="25" rx="4" fill="#EBF5FB" stroke="#4A90D9" stroke-width="1"/>
  <text x="500" y="145" text-anchor="middle" fill="#2C3E50" font-size="12" font-weight="bold">MobileNetV3-Small (Pretrained)</text>

  <text x="395" y="170" fill="#555" font-size="10.5">Features: 576 channels output</text>
  <text x="395" y="185" fill="#555" font-size="10.5">AdaptiveAvgPool2d → (1,1)</text>
  <text x="395" y="200" fill="#555" font-size="10.5">FC: 576 → 256</text>
  <text x="395" y="215" fill="#555" font-size="10.5">Activation: SiLU (Swish)</text>
  <text x="395" y="230" fill="#555" font-size="10.5">Dropout: p=0.2</text>

  <rect x="385" y="243" width="230" height="22" rx="4" fill="#D4EFDF" stroke="#27AE60" stroke-width="1"/>
  <text x="500" y="258" text-anchor="middle" fill="#1E8449" font-size="10.5" font-weight="bold">Output: [B, 256] + [B, 16, 256]</text>

  <!-- Arrow from Spatial to Temporal (per-frame features) -->
  <path d="M 500,284 L 500,318" stroke="#5CB85C" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>
  <defs><marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5CB85C"/></marker></defs>
  <text x="520" y="305" fill="#5CB85C" font-size="9" font-style="italic">per-frame features</text>

  <!-- ==================== BRANCH 2: TEMPORAL (Middle) ==================== -->
  <rect x="370" y="320" width="260" height="170" rx="10" fill="white" stroke="#5CB85C" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="370" y="320" width="260" height="34" rx="10" fill="url(#temporalGrad)"/>
  <rect x="370" y="342" width="260" height="12" fill="url(#temporalGrad)"/>
  <text x="500" y="343" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Temporal Branch</text>

  <rect x="385" y="365" width="230" height="25" rx="4" fill="#EAFAF1" stroke="#5CB85C" stroke-width="1"/>
  <text x="500" y="382" text-anchor="middle" fill="#2C3E50" font-size="12" font-weight="bold">Bidirectional LSTM (BiLSTM)</text>

  <text x="395" y="407" fill="#555" font-size="10.5">Input: [B, 16, 256]</text>
  <text x="395" y="422" fill="#555" font-size="10.5">Hidden Dim: 128</text>
  <text x="395" y="437" fill="#555" font-size="10.5">Layers: 2, Bidirectional: True</text>
  <text x="395" y="452" fill="#555" font-size="10.5">Final: concat(h_fwd, h_bwd)</text>

  <rect x="385" y="462" width="230" height="22" rx="4" fill="#D4EFDF" stroke="#27AE60" stroke-width="1"/>
  <text x="500" y="477" text-anchor="middle" fill="#1E8449" font-size="10.5" font-weight="bold">Output: [B, 256]</text>

  <!-- ==================== BRANCH 3: FREQUENCY (Bottom) ==================== -->
  <rect x="370" y="520" width="260" height="200" rx="10" fill="white" stroke="#9B59B6" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="370" y="520" width="260" height="34" rx="10" fill="url(#freqGrad)"/>
  <rect x="370" y="542" width="260" height="12" fill="url(#freqGrad)"/>
  <text x="500" y="543" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Frequency Branch</text>

  <rect x="385" y="565" width="230" height="25" rx="4" fill="#F4ECF7" stroke="#9B59B6" stroke-width="1"/>
  <text x="500" y="582" text-anchor="middle" fill="#2C3E50" font-size="12" font-weight="bold">2D FFT + Custom CNN</text>

  <text x="395" y="607" fill="#555" font-size="10.5">Center frame → FFT2D + fftshift</text>
  <text x="395" y="622" fill="#555" font-size="10.5">Log magnitude spectrum</text>
  <text x="395" y="637" fill="#555" font-size="10.5">Conv(3→16→32→64) + BN + ReLU</text>
  <text x="395" y="652" fill="#555" font-size="10.5">AdaptiveAvgPool → FC: 64→128</text>
  <text x="395" y="667" fill="#555" font-size="10.5">Dropout: p=0.2</text>

  <rect x="385" y="680" width="230" height="22" rx="4" fill="#D4EFDF" stroke="#27AE60" stroke-width="1"/>
  <text x="500" y="695" text-anchor="middle" fill="#1E8449" font-size="10.5" font-weight="bold">Output: [B, 128]</text>

  <!-- ==================== ARROWS TO FUSION ==================== -->
  <!-- Spatial mean output arrow -->
  <path d="M 632,182 L 720,182 L 720,380 L 760,380" stroke="#4A90D9" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="730" y="270" fill="#4A90D9" font-size="10" font-weight="bold" transform="rotate(90,730,270)">256-d</text>

  <!-- Temporal output arrow -->
  <line x1="632" y1="420" x2="760" y2="400" stroke="#5CB85C" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="700" y="400" fill="#5CB85C" font-size="10" font-weight="bold">256-d</text>

  <!-- Frequency output arrow -->
  <path d="M 632,620 L 720,620 L 720,420 L 760,420" stroke="#9B59B6" stroke-width="2.5" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="730" y="530" fill="#9B59B6" font-size="10" font-weight="bold" transform="rotate(90,730,530)">128-d</text>

  <!-- ==================== FEATURE FUSION ==================== -->
  <rect x="765" y="345" width="150" height="110" rx="10" fill="white" stroke="#E67E22" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="765" y="345" width="150" height="34" rx="10" fill="url(#fusionGrad)"/>
  <rect x="765" y="367" width="150" height="12" fill="url(#fusionGrad)"/>
  <text x="840" y="368" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Feature Fusion</text>

  <text x="840" y="400" text-anchor="middle" fill="#333" font-size="11">Concatenation</text>
  <text x="840" y="418" text-anchor="middle" fill="#555" font-size="10.5">256 + 256 + 128</text>

  <rect x="780" y="428" width="120" height="20" rx="4" fill="#FDEBD0" stroke="#E67E22" stroke-width="1"/>
  <text x="840" y="442" text-anchor="middle" fill="#D35400" font-size="11" font-weight="bold">= 640-d vector</text>

  <!-- Arrow from Fusion to Classifier -->
  <line x1="917" y1="400" x2="965" y2="400" stroke="#666" stroke-width="2.5" marker-end="url(#arrowGrey)"/>

  <!-- ==================== CLASSIFIER HEAD ==================== -->
  <rect x="970" y="310" width="190" height="180" rx="10" fill="white" stroke="#E74C3C" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="970" y="310" width="190" height="34" rx="10" fill="url(#classifierGrad)"/>
  <rect x="970" y="332" width="190" height="12" fill="url(#classifierGrad)"/>
  <text x="1065" y="333" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Classification Head</text>

  <text x="1065" y="365" text-anchor="middle" fill="#333" font-size="11">FC: 640 → 256</text>
  <text x="1065" y="383" text-anchor="middle" fill="#333" font-size="11">ReLU Activation</text>
  <text x="1065" y="401" text-anchor="middle" fill="#333" font-size="11">Dropout (p=0.3)</text>
  <text x="1065" y="419" text-anchor="middle" fill="#333" font-size="11">FC: 256 → 1</text>

  <rect x="990" y="432" width="150" height="20" rx="4" fill="#FADBD8" stroke="#E74C3C" stroke-width="1"/>
  <text x="1065" y="446" text-anchor="middle" fill="#C0392B" font-size="10.5" font-weight="bold">Sigmoid → Probability</text>

  <rect x="990" y="458" width="150" height="20" rx="4" fill="#F9E79F" stroke="#F1C40F" stroke-width="1"/>
  <text x="1065" y="472" text-anchor="middle" fill="#7D6608" font-size="10.5" font-weight="bold">BCEWithLogitsLoss</text>

  <!-- Arrow from Classifier to Output -->
  <line x1="1162" y1="400" x2="1210" y2="400" stroke="#666" stroke-width="2.5" marker-end="url(#arrowGrey)"/>

  <!-- ==================== OUTPUT ==================== -->
  <!-- REAL box -->
  <rect x="1220" y="310" width="155" height="70" rx="12" fill="#D5F5E3" stroke="#27AE60" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1297" y="340" text-anchor="middle" fill="#1E8449" font-size="20">&#10004;</text>
  <text x="1297" y="365" text-anchor="middle" fill="#1E8449" font-size="16" font-weight="bold">REAL</text>

  <!-- FAKE box -->
  <rect x="1220" y="410" width="155" height="70" rx="12" fill="#FADBD8" stroke="#E74C3C" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1297" y="440" text-anchor="middle" fill="#C0392B" font-size="20">&#9888;</text>
  <text x="1297" y="465" text-anchor="middle" fill="#C0392B" font-size="16" font-weight="bold">FAKE</text>

  <!-- Confidence label -->
  <text x="1297" y="505" text-anchor="middle" fill="#666" font-size="11" font-style="italic">+ Confidence Score</text>

  <!-- ==================== LEGEND / FOOTER ==================== -->
  <rect x="20" y="710" width="1360" height="30" rx="6" fill="#ECF0F1"/>
  <text x="700" y="730" text-anchor="middle" fill="#7F8C8D" font-size="12">
    Hybrid Deep Learning Architecture: MobileNetV3-Small (Spatial) + BiLSTM (Temporal) + FFT-CNN (Frequency) | Trained with AMP + Gradient Accumulation | Deployed via ONNX Runtime
  </text>
</svg>